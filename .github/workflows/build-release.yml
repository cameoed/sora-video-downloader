name: Build Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build macOS arm64 Artifacts
        run: node desktop/scripts/prepare-release.js && CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac dmg zip --arm64 --publish never

      - name: Build macOS x64 Artifacts
        run: node desktop/scripts/prepare-release.js && CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac dmg zip --x64 --publish never

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sora-backup-app-macos
          path: release/*

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Windows Artifacts
        run: npm run dist:win

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sora-backup-app-windows
          path: release/*
